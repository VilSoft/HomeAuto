version: "3.8"

services:
  landingpage:
    build: ./  # if building locally
    # image: ghcr.io/<your-username>/kassiesrecipies:latest  # for CI/CD
    container_name: landingpage
    restart: unless-stopped
    network_mode: host
    environment:
      MONGO_URI: mongodb://admin:STRONG_PASSWORD_HERE@localhost:27017/mydatabase?authSource=admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health/get"]
      interval: 30s
      timeout: 5s
      retries: 5
